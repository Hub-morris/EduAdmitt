app = "eduadmit-backend-morris"
primary_region = "sin"

[build]
  # Fly will use the Dockerfile at the backend context
  dockerfile = "Dockerfile"

[[mounts]]
  source = "uploads"
  destination = "/app/uploads"

[env]
  PORT = "5000"
  ORIGIN = "https://your-production-domain.com"
  # SMTP credentials and sensitive secrets should be set as Fly secrets.
  # Example commands:
  # fly secrets set SMTP_HOST=smtp.gmail.com SMTP_PORT=587 SMTP_USER=your-email@gmail.com SMTP_PASS=your-app-password SMTP_SECURE=false
  # fly secrets set JWT_SECRET=your_jwt_secret SESSION_SECRET=your_session_secret
